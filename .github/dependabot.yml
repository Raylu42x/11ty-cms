version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: monthly

  - package-ecosystem: docker
    directory: '/'
    schedule:
      interval: monthly
  - package-ecosystem: docker
      directory: "/"                                                                                                      
      schedule:                                                                                                           
        interval: monthly
      ignore:                                                                                                             
        - dependency-name: "node"                             
          update-types: ["version-update:semver-major"]
